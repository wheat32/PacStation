name: CI

on:
  pull_request:
    branches:
      - main

jobs:
  build:
    name: Build (Ubuntu)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Qt 6 and build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake ninja-build \
            qt6-base-dev qt6-svg-dev libqt6svg6-dev \
            libgl1-mesa-dev

      - name: Configure
        run: cmake -S src -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --parallel

      - name: Confirm binary exists
        run: test -f build/pacstation

